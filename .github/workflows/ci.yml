# Automates: clang-format (check), multi-OS Debug build + tests, -Werror strict build, clang-tidy build.
# Local parity: ./scripts/ci-local.sh (after: git submodule update --init --recursive)
#
# vcpkg binary cache: uses the official GitHub Actions backend (see VCPKG_BINARY_SOURCES below).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# actions:write lets vcpkg push/pull binary cache entries via the x-gha provider.
permissions:
  contents: read
  actions: write

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18
      - name: Check formatting
        run: |
          mapfile -t files < <(git ls-files | grep -E '^(src|tests|benchmarks|fuzz)/.*\.(cpp|h|hpp)$' || true)
          if [ "${#files[@]}" -eq 0 ]; then echo "No matching first-party sources"; exit 1; fi
          clang-format-18 --dry-run --Werror "${files[@]}"

  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28.6"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm ninja

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja --yes

      - name: Configure (Debug + sanitizers on Unix)
        shell: bash
        run: |
          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            export CMAKE_CXX_COMPILER="/opt/homebrew/opt/llvm/bin/clang++"
            export CMAKE_C_COMPILER="/opt/homebrew/opt/llvm/bin/clang"
            export CMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld -L/opt/homebrew/opt/llvm/lib/c++ -Wl,-rpath,/opt/homebrew/opt/llvm/lib/c++"
            export CMAKE_SHARED_LINKER_FLAGS="-fuse-ld=lld -L/opt/homebrew/opt/llvm/lib/c++ -Wl,-rpath,/opt/homebrew/opt/llvm/lib/c++"
            export CMAKE_MODULE_LINKER_FLAGS="-fuse-ld=lld -L/opt/homebrew/opt/llvm/lib/c++ -Wl,-rpath,/opt/homebrew/opt/llvm/lib/c++"
          fi
          cmake --preset debug

      - name: Build
        run: cmake --build --preset debug --parallel

      - name: Test
        run: ctest --preset debug --output-on-failure

      - name: Configure (strict / -Werror on first-party code)
        shell: bash
        run: |
          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            export CMAKE_CXX_COMPILER="/opt/homebrew/opt/llvm/bin/clang++"
            export CMAKE_C_COMPILER="/opt/homebrew/opt/llvm/bin/clang"
            export CMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld -L/opt/homebrew/opt/llvm/lib/c++ -Wl,-rpath,/opt/homebrew/opt/llvm/lib/c++"
            export CMAKE_SHARED_LINKER_FLAGS="-fuse-ld=lld -L/opt/homebrew/opt/llvm/lib/c++ -Wl,-rpath,/opt/homebrew/opt/llvm/lib/c++"
            export CMAKE_MODULE_LINKER_FLAGS="-fuse-ld=lld -L/opt/homebrew/opt/llvm/lib/c++ -Wl,-rpath,/opt/homebrew/opt/llvm/lib/c++"
          fi
          cmake --preset debug-strict

      - name: Build strict
        run: cmake --build --preset debug-strict --parallel

  clang-tidy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28.6"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang-tidy-18
      - name: Configure & build with clang-tidy
        run: |
          cmake --preset clang-tidy -DHTTP_SERVER_CLANG_TIDY_EXECUTABLE=/usr/bin/clang-tidy-18
          cmake --build --preset clang-tidy --parallel
